<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم - سامانه مناقصه دیلی مارکت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        .shape:nth-child(4) {
            width: 100px;
            height: 100px;
            top: 30%;
            right: 30%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-50px) rotate(180deg);
                opacity: 0.6;
            }
        }

        /* Container */
        .login-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .login-header {
            background: linear-gradient(135deg, #2563EB 0%, #1e40af 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .login-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Form */
        .login-form {
            padding: 40px 35px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: #64748b;
        }

        .tab.active {
            background: linear-gradient(135deg, #2563EB 0%, #1e40af 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #94a3b8;
        }

        .form-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563EB;
            background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .form-input::placeholder {
            color: #cbd5e1;
        }

        .password-toggle {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
            color: #94a3b8;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #2563EB;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #475569;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-link {
            color: #2563EB;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #1e40af;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2563EB 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #94a3b8;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            padding: 0 15px;
        }

        .register-link {
            text-align: center;
            color: #64748b;
            font-size: 14px;
        }

        .register-link a {
            color: #2563EB;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .register-link a:hover {
            color: #1e40af;
        }

        /* Alert */
        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.error {
            background: #fee2e2;
            color: #dc2626;
            border: 2px solid #fca5a5;
        }

        .alert.success {
            background: #d1fae5;
            color: #059669;
            border: 2px solid #6ee7b7;
        }

        /* Footer */
        .login-footer {
            background: #f8fafc;
            padding: 20px;
            text-align: center;
            color: #64748b;
            font-size: 13px;
            border-top: 1px solid #e2e8f0;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                margin: 0 15px;
            }

            .login-form {
                padding: 30px 25px;
            }

            .login-title {
                font-size: 22px;
            }

            .remember-forgot {
                flex-direction: column;
                gap: 10px;
                align-items: start;
            }
        }

        /* Loading Animation */
        .btn-login.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <!-- Header -->
        <div class="login-header">
            <div class="logo">🏢</div>
            <h1 class="login-title">سامانه مناقصه دیلی مارکت</h1>
            <p class="login-subtitle">سیستم مدیریت مناقصات و پیمانکاران</p>
        </div>

        <!-- Form -->
        <div class="login-form">
            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" data-role="admin">👤 ادمین</div>
                <div class="tab" data-role="contractor">👷 پیمانکار</div>
            </div>

            <!-- Alert -->
            <div class="alert error" id="alertBox"></div>

            <form id="loginForm">
                <!-- Email/Username -->
                <div class="form-group">
                    <label class="form-label">ایمیل یا نام کاربری</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="text" class="form-input" id="username" placeholder="example@dailymarket.com" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label">رمز عبور</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                        <span class="password-toggle" onclick="togglePassword()">👁️</span>
                    </div>
                </div>

                <!-- Remember & Forgot -->
                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>مرا به خاطر بسپار</span>
                    </label>
                    <a href="#" class="forgot-link">رمز عبور را فراموش کرده‌اید؟</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-login">
                    <span class="spinner"></span>
                    <span>ورود به سیستم</span>
                    <span>🚀</span>
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>یا</span>
                </div>

                <!-- Register Link -->
                <div class="register-link">
                    حساب کاربری ندارید؟ 
                    <a href="#" onclick="showRegisterModal()">ثبت‌نام پیمانکار جدید</a>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            © 1403 دیلی مارکت | تمامی حقوق محفوظ است
        </div>
    </div>

    <script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    const sb = supabase.createClient(
        'https://hencbjwhoobvytfnlguy.supabase.co',
        'sb_publishable_jqdXv1YVG5MbxBjy7jAQlA_wFGHGfaD'
    );

    let currentRole = 'admin';

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentRole = this.dataset.role;
            document.getElementById('username').placeholder =
                currentRole === 'admin' ? 'admin@dailymarket.com' : 'contractor@example.com';
        });
    });

    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.querySelector('.password-toggle');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.textContent = input.type === 'password' ? '👁️' : '🙈';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const btn = document.querySelector('.btn-login');
        const alertBox = document.getElementById('alertBox');
        btn.classList.add('loading');

        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
            btn.classList.remove('loading');
            alertBox.className = 'alert error';
            alertBox.textContent = '❌ ایمیل یا رمز عبور اشتباه است!';
            alertBox.style.display = 'block';
            return;
        }

        const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
        btn.classList.remove('loading');
        alertBox.className = 'alert success';
        alertBox.textContent = '✅ ورود موفقیت‌آمیز! در حال انتقال...';
        alertBox.style.display = 'block';

        setTimeout(() => {
            window.location.href = (profile && profile.role === 'admin') ? 'admin-dashboard.html' : 'contractor-dashboard.html';
        }, 1000);
    });

    async function showRegisterModal() {
        const companyName = prompt('نام شرکت:'); if (!companyName) return;
        const fullName = prompt('نام و نام‌خانوادگی:'); if (!fullName) return;
        const phone = prompt('شماره تماس:'); if (!phone) return;
        const email = prompt('ایمیل:'); if (!email) return;
        const password = prompt('رمز عبور (حداقل ۶ کاراکتر):'); if (!password) return;

        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { alert('❌ خطا: ' + error.message); return; }

        const { error: profileError } = await sb.from('profiles').insert({
            id: data.user.id, role: 'contractor', full_name: fullName, company_name: companyName, phone
        });
        if (profileError) { alert('❌ خطا در ثبت پروفایل: ' + profileError.message); return; }

        alert('✅ ثبت‌نام موفق! حالا وارد شوید.');
    }
</script>

    </script>
</body>
</html>
