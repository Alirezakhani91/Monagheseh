<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقایسه پیشنهادات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .page-header {
            background: linear-gradient(135deg, #2563EB 0%, #1e40af 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 { font-size: 20px; }

        .back-link { color: white; text-decoration: none; font-size: 14px; opacity: 0.9; }

        .project-info {
            background: #f8fafc;
            margin: 25px 30px 0;
            padding: 20px;
            border-radius: 12px;
            border-right: 4px solid #2563EB;
        }

        .project-info h2 { font-size: 18px; color: #1e293b; margin-bottom: 8px; }
        .project-info .meta { font-size: 14px; color: #475569; }

        .main-content { padding: 25px 30px 35px; }

        .proposal-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 22px;
            margin-bottom: 18px;
        }

        .proposal-card.best {
            border-color: #10B981;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }

        .proposal-card.accepted {
            border-color: #F59E0B;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
        }

        .proposal-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .contractor-name { font-size: 17px; font-weight: bold; color: #1e293b; }

        .best-badge {
            background: #10B981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .accepted-badge {
            background: #F59E0B;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .proposal-meta {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            font-size: 14px;
            color: #475569;
        }

        .proposal-meta strong { color: #1e293b; }

        .proposal-notes {
            font-size: 14px;
            color: #475569;
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            white-space: pre-line;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-accept {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
        }

        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>📊 مقایسه پیشنهادات</h1>
            <a href="admin-dashboard.html" class="back-link">← بازگشت به داشبورد</a>
        </div>

        <div class="project-info" id="projectInfo">
            <h2>در حال بارگذاری...</h2>
        </div>

        <div class="main-content">
            <div id="proposalsList">
                <div class="empty-state">در حال بارگذاری پیشنهادات...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const sb = supabase.createClient(
            'https://hencbjwhoobvytfnlguy.supabase.co',
            'sb_publishable_jqdXv1YVG5MbxBjy7jAQlA_wFGHGfaD'
        );

        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('project');

        function formatMoney(n) {
            if (n === null || n === undefined) return '-';
            return Number(n).toLocaleString('fa-IR') + ' تومان';
        }

        async function acceptProposal(proposalId, projectId) {
            if (!confirm('آیا مطمئن هستید که می‌خواهید این پیمانکار را به عنوان برنده انتخاب کنید؟')) return;

            await sb.from('proposals').update({ status: 'rejected' }).eq('project_id', projectId);
            await sb.from('proposals').update({ status: 'accepted' }).eq('id', proposalId);
            await sb.from('projects').update({ status: 'closed' }).eq('id', projectId);

            loadData();
        }

        async function loadData() {
            const projectResult = await sb.from('projects').select('*').eq('id', projectId).single();
            const project = projectResult.data;

            if (!project) {
                document.getElementById('projectInfo').innerHTML = '<h2>❌ پروژه یافت نشد.</h2>';
                return;
            }

            document.getElementById('projectInfo').innerHTML =
                '<h2>🏪 ' + project.title + '</h2>' +
                '<div class="meta">💰 بودجه تخمینی: <strong>' + formatMoney(project.budget_estimate) + '</strong>' +
                (project.status === 'closed' ? ' &nbsp;|&nbsp; ✅ این پروژه بسته شده است' : '') + '</div>';

            const proposalsResult = await sb.from('proposals').select('*').eq('project_id', projectId).order('price', { ascending: true });
            const proposals = proposalsResult.data || [];

            const list = document.getElementById('proposalsList');
            list.innerHTML = '';

            if (proposals.length === 0) {
                list.innerHTML = '<div class="empty-state">هنوز هیچ پیشنهادی برای این پروژه ثبت نشده است.</div>';
                return;
            }

            const contractorIds = proposals.map(function (p) { return p.contractor_id; });
            const profilesResult = await sb.from('profiles').select('*').in('id', contractorIds);
            const profiles = profilesResult.data || [];

            let minPrice = null;
            proposals.forEach(function (p) { if (minPrice === null || p.price < minPrice) minPrice = p.price; });

            proposals.forEach(function (p) {
                const profile = profiles.find(function (pr) { return pr.id === p.contractor_id; });
                const isBest = p.price === minPrice;
                const isAccepted = p.status === 'accepted';

                const card = document.createElement('div');
                card.className = 'proposal-card' + (isAccepted ? ' accepted' : (isBest ? ' best' : ''));

                card.innerHTML =
                    '<div class="proposal-top">' +
                    '<div class="contractor-name">👷 ' + (profile ? profile.company_name || profile.full_name : 'پیمانکار') + '</div>' +
                    (isAccepted ? '<span class="accepted-badge">🏆 برنده انتخاب شده</span>' : (isBest ? '<span class="best-badge">💵 کمترین قیمت</span>' : '')) +
                    '</div>' +
                    '<div class="proposal-meta">' +
                    '<div>💰 قیمت: <strong>' + formatMoney(p.price) + '</strong></div>' +
                    '<div>⏱️ مدت اجرا: <strong>' + (p.duration_days ? p.duration_days + ' روز' : '-') + '</strong></div>' +
                    '<div>📞 تماس: <strong>' + (profile ? profile.phone || '-' : '-') + '</strong></div>' +
                    '</div>' +
                    (p.notes ? '<div class="proposal-notes">' + p.notes + '</div>' : '') +
                    (project.status !== 'closed' ? '<button class="btn btn-accept" onclick="acceptProposal(\'' + p.id + '\', \'' + projectId + '\')">✅ انتخاب به عنوان برنده</button>' : '');

                list.appendChild(card);
            });
        }

        async function guardAndLoad() {
            if (!projectId) {
                document.getElementById('projectInfo').innerHTML = '<h2>❌ پروژه‌ای مشخص نشده است.</h2>';
                return;
            }
            const sessionResult = await sb.auth.getSession();
            const session = sessionResult.data.session;
            if (!session) { window.location.href = 'index.html'; return; }

            const profileResult = await sb.from('profiles').select('role').eq('id', session.user.id).single();
            if (!profileResult.data || profileResult.data.role !== 'admin') {
                window.location.href = 'contractor-dashboard.html';
                return;
            }

            loadData();
        }

        guardAndLoad();
    </script>
</body>
</html>
