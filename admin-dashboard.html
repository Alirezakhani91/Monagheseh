<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد ادمین - سامانه مناقصه دیلی مارکت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2563EB 0%, #1e40af 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            border-radius: 8px;
        }

        .main-content {
            padding: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card.green {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
        }

        .stat-card.yellow {
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
        }

        .stat-card.blue {
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            color: #1e293b;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563EB 0%, #1e40af 100%);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            transform: translateY(-2px);
        }

        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .project-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s;
        }

        .project-card:hover {
            border-color: #2563EB;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.15);
            transform: translateY(-2px);
        }

        .project-title {
            font-size: 20px;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.open {
            background: #fee2e2;
            color: #dc2626;
        }

        .status-badge.closed {
            background: #d1fae5;
            color: #059669;
        }

        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: #475569;
        }

        .meta-item strong {
            color: #1e293b;
        }

        .project-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .btn-success {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .project-meta { flex-direction: column; gap: 10px; }
            .project-actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏢 سامانه مناقصه دیلی مارکت</div>
            <div class="header-right">
                <div class="user-menu" id="userMenu">👤 در حال بارگذاری...</div>
                <button class="btn" style="color: white; background: rgba(255,255,255,0.2); border: none;" onclick="logout()">خروج</button>
            </div>
        </div>

        <div class="main-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-number" id="statOpen">0</div>
                    <div class="stat-label">پروژه فعال</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-icon">✅</div>
                    <div class="stat-number" id="statClosed">0</div>
                    <div class="stat-label">بسته شده</div>
                </div>
                <div class="stat-card blue">
                    <div class="stat-icon">👷</div>
                    <div class="stat-number" id="statContractors">0</div>
                    <div class="stat-label">پیمانکار ثبت‌نام شده</div>
                </div>
                <div class="stat-card yellow">
                    <div class="stat-icon">📝</div>
                    <div class="stat-number" id="statProposals">0</div>
                    <div class="stat-label">کل پیشنهادات دریافتی</div>
                </div>
            </div>

            <div class="section-header">
                <h2 class="section-title">پروژه‌های اخیر</h2>
                <button class="btn btn-primary" onclick="location.href='create-project.html'">+ ایجاد پروژه جدید</button>
            </div>

            <div class="projects-list" id="projectsList">
                <div class="empty-state">در حال بارگذاری پروژه‌ها...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const sb = supabase.createClient(
            'https://hencbjwhoobvytfnlguy.supabase.co',
            'sb_publishable_jqdXv1YVG5MbxBjy7jAQlA_wFGHGfaD'
        );

        function formatMoney(n) {
            if (n === null || n === undefined) return '-';
            return Number(n).toLocaleString('fa-IR') + ' تومان';
        }

        function daysLeft(deadline) {
            if (!deadline) return null;
            return Math.ceil((new Date(deadline) - new Date()) / (1000 * 60 * 60 * 24));
        }

        async function logout() {
            await sb.auth.signOut();
            window.location.href = 'index.html';
        }

        async function renderProjects() {
            const list = document.getElementById('projectsList');

            const projectsResult = await sb.from('projects').select('*').order('created_at', { ascending: false });
            const projects = projectsResult.data || [];

            const proposalsResult = await sb.from('proposals').select('*');
            const allProposals = proposalsResult.data || [];

            document.getElementById('statOpen').textContent = projects.filter(function (p) { return p.status === 'open'; }).length;
            document.getElementById('statClosed').textContent = projects.filter(function (p) { return p.status === 'closed'; }).length;
            document.getElementById('statProposals').textContent = allProposals.length;

            const contractorsResult = await sb.from('profiles').select('id').eq('role', 'contractor');
            document.getElementById('statContractors').textContent = (contractorsResult.data || []).length;

            list.innerHTML = '';

            if (projects.length === 0) {
                list.innerHTML = '<div class="empty-state">هنوز پروژه‌ای ایجاد نکرده‌اید. روی «ایجاد پروژه جدید» بزنید.</div>';
                return;
            }

            projects.forEach(function (p) {
                const projectProposals = allProposals.filter(function (pr) { return pr.project_id === p.id; });
                let minPrice = null;
                projectProposals.forEach(function (pr) {
                    if (minPrice === null || pr.price < minPrice) minPrice = pr.price;
                });
                const dLeft = daysLeft(p.deadline);

                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML =
                    '<div class="project-title">🏪 ' + p.title +
                    ' <span class="status-badge ' + p.status + '">' + (p.status === 'open' ? '🔴 فعال' : '✅ بسته شده') + '</span></div>' +
                    '<div class="project-meta">' +
                    '<div class="meta-item">💰 بودجه تخمینی: <strong>' + formatMoney(p.budget_estimate) + '</strong></div>' +
                    '<div class="meta-item">⏰ مهلت: <strong>' + (dLeft !== null ? dLeft + ' روز مانده' : 'نامشخص') + '</strong></div>' +
                    '<div class="meta-item">📊 تعداد پیشنهادات: <strong>' + projectProposals.length + '</strong></div>' +
                    '<div class="meta-item">💵 کمترین قیمت: <strong>' + (minPrice !== null ? formatMoney(minPrice) : '-') + '</strong></div>' +
                    '</div>' +
                    '<div class="project-actions">' +
                    '<button class="btn btn-success" onclick="location.href=\'compare-proposals.html?project=' + p.id + '\'">مشاهده پیشنهادات (' + projectProposals.length + ')</button>' +
                    '</div>';
                list.appendChild(card);
            });
        }

        async function init() {
            const sessionResult = await sb.auth.getSession();
            const session = sessionResult.data.session;
            if (!session) {
                window.location.href = 'index.html';
                return;
            }

            const profileResult = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            const profile = profileResult.data;
            if (!profile || profile.role !== 'admin') {
                window.location.href = 'contractor-dashboard.html';
                return;
            }

            document.getElementById('userMenu').textContent = '👤 ' + (profile.full_name || 'مدیر سیستم');
            renderProjects();
        }

        init();
    </script>
</body>
</html>
